services:
  # =========================
  # NGINX (Gateway)
  # =========================
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/var/www/uploads
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # =========================
  # FRONTEND (Next.js)
  # =========================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLIENT_URL: ${NEXT_PUBLIC_CLIENT_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
        NEXT_PUBLIC_FILE_URL: ${NEXT_PUBLIC_FILE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_TURNSTILE_KEY: ${NEXT_PUBLIC_TURNSTILE_KEY}
    image: ${FE_IMAGE}
    container_name: frontend
    networks:
      - app-network
  # =========================
  # BACKEND (Express + Prisma)
  # =========================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ${BE_IMAGE}
    container_name: backend
    restart: always
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # =========================
  # MYSQL
  # =========================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    command: --lower_case_table_names=1
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6380:6379" # optional
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# =========================
# VOLUMES
# =========================
volumes:
  mysql_data:
  redis_data:
  uploads:

# =========================
# NETWORK
# =========================
networks:
  app-network:
    driver: bridge
