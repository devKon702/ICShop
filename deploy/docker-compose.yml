version: "3.9"

services:
  # =========================
  # NGINX (Gateway)
  # =========================
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/var/www/uploads
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  # =========================
  # FRONTEND (Next.js)
  # =========================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLIENT_URL: ${NEXT_PUBLIC_CLIENT_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
        NEXT_PUBLIC_FILE_URL: ${NEXT_PUBLIC_FILE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_TURNSTILE_KEY: ${NEXT_PUBLIC_TURNSTILE_KEY}
    container_name: frontend
    networks:
      - app-network
  # =========================
  # BACKEND (Express + Prisma)
  # =========================
  backend:
    image: ${BE_IMAGE}
    container_name: backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # =========================
  # MYSQL
  # =========================
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379" # optional
    volumes:
      - redis_data:/data
    networks:
      - app-network

# =========================
# VOLUMES
# =========================
volumes:
  mysql_data:
  redis_data:

# =========================
# NETWORK
# =========================
networks:
  app-network:
    driver: bridge
